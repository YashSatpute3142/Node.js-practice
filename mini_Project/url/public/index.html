<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>URL</title>
</head>
<body>
    <div class="container">
        <h1>URL Shortener</h1>
        <form id="shorten-form">
            <div>
                <label for="url">Enter URL:</label>
                <input 
                type="url" 
                name="url"
                id="yrl" 
                required
                >
            </div>
            <div>
                <label for="shortCode">Enter shortCode:</label>
                <input type="text" name="shortCode" id="shortCode" required>

            </div>
            <button type="submit">Shorten</button>

        </form>

        <h2>Shortenend URLs</h2>
        <div class="urls">
            <ul id="shortened-urls">

        </ul>
        </div>
        
    </div>
    <script>


        const fetchShortendUrl = async() => {
            const response = await fetch("/links");
            const links = await response.json();
            console.log("Links :", links);

            const list = document.getElementById("shortened-urls");
            list.innerHTML = "";

            for (const[shortCode, url] of Object.entries(links)){
                const li = document.createElement('li');
                li.innerHTML = `<a href = "/${shortCode}" target= "_blank">
                ${window.location.origin} /${shortCode} </a> - ${url}`;

                list.appendChild(li);
                
            }

        }

        document.getElementById('shorten-form')
        .addEventListener('submit', async(event) => {
            event.preventDefault();
            const formData = new FormData(event.target);
            const url = formData.get('url');
            const shortCode = formData.get('shortCode');
            console.log(url, shortCode);

            try {
               const responce = await fetch("/shorten", {
                method : "POST",
                headers : {"Content-Type" : "application/json"},
                body : JSON.stringify({url , shortCode})
               })

               if(responce.ok){
                fetchShortendUrl();
                alert("Form Submiteed Successfilly...! :)")
                event.target.reset();
               }else{
                const errorMessage = await responce.text();
                alert(errorMessage);
               }
                
            } catch (error) {
                console.log(error);
                
                
            }
            
        })

        fetchShortendUrl();
    </script>
    
</body>
</html>
